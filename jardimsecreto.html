<!DOCTYPE html>
<html>
<head>
<title>Projeto Jardim Secreto</title>
<meta charset="UTF-8">

<style>
body{
font-family:Arial;
background:#d7f5d1;
text-align:center;
}

header{
background:#2e7d32;
color:white;
padding:20px;
}

.feed{
margin-top:30px;
}

.post{
background:white;
padding:15px;
margin:20px auto;
width:300px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.botao{
position:fixed;
bottom:20px;
right:20px;
background:#2e7d32;
color:white;
border:none;
padding:15px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

#form{
display:none;
background:white;
padding:20px;
width:300px;
margin:20px auto;
border-radius:10px;
}

img,video{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🌿 Projeto Jardim Secreto</h1>
<p>Compartilhe fotos da natureza</p>
</header>

<div id="form">
<input id="senha" type="password" placeholder="Senha"><br><br>
<input id="titulo" placeholder="Título"><br><br>
<textarea id="desc" placeholder="Descrição"></textarea><br><br>
<input type="file" id="file"><br><br>
<button onclick="postar()">Publicar</button>
</div>

<div id="feed" class="feed">
<p id="vazio">🌱 Sem fotos ou vídeos</p>
</div>

<button class="botao" onclick="abrir()">+</button>

<script>

const senhaCorreta = "Jardimsecreto"

function abrir(){
let f = document.getElementById("form")

if(f.style.display=="block"){
f.style.display="none"
}else{
f.style.display="block"
}
}

function postar(){

let senha = document.getElementById("senha").value

if(senha != senhaCorreta){
alert("Senha errada")
return
}

let titulo = document.getElementById("titulo").value
let desc = document.getElementById("desc").value
let file = document.getElementById("file").files[0]

if(!file){
alert("Escolha um arquivo")
return
}

let url = URL.createObjectURL(file)

let post = document.createElement("div")
post.className="post"

let midia

if(file.type.startsWith("image")){
midia = `<img src="${url}">`
}else{
midia = `<video controls src="${url}"></video>`
}

post.innerHTML = `
<h3>${titulo}</h3>
<p>${desc}</p>
${midia}
`

document.getElementById("feed").appendChild(post)

document.getElementById("vazio").style.display="none"

}

</script>

</body>
</html>
